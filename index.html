<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניתוח לוטו חכמה</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        input[type="number"] {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .results-area {
            margin-top: 20px;
            padding: 15px;
            min-height: 100px;
            background: #fafafa;
            border-radius: 8px;
        }

        .lotto-ball {
            display: inline-block;
            width: 35px;
            height: 35px;
            line-height: 35px;
            text-align: center;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            margin: 3px;
            font-weight: bold;
        }

        .status-msg {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
        }

        .approved { background: #d4edda; color: var(--success); border: 1px solid var(--success); }
        .rejected { background: #f8d7da; color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>מערכת ניתוח לוטו - אסטרטגיית מנדל</h1>

    <div class="section">
        <h3>1. בדוק אם הצירוף שלך נמצא ב"רשימה הלבנה"</h3>
        <p>הזן 6 מספרים (1-37) כדי לבדוק אם הם עברו את סינוני המערכת:</p>
        <div class="input-group" id="numberInputs">
            <input type="number" min="1" max="37" class="lotto-in">
            <input type="number" min="1" max="37" class="lotto-in">
            <input type="number" min="1" max="37" class="lotto-in">
            <input type="number" min="1" max="37" class="lotto-in">
            <input type="number" min="1" max="37" class="lotto-in">
            <input type="number" min="1" max="37" class="lotto-in">
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="checkNumbers()">בדוק זכאות צירוף</button>
        </div>
        <div id="checkResult"></div>
    </div>

    <div class="section">
        <h3>2. בחר אסטרטגיית ייצור</h3>
        <div class="menu-grid">
            <button onclick="fetchSuggestions('coverage')">כיסוי מקסימלי (200 צירופים)</button>
            <button onclick="fetchSuggestions('top-stat')">סטטיסטיקה חזקה (Hot Numbers)</button>
            <button onclick="fetchSuggestions('diverse')">גיוון עשרויות מקסימלי</button>
        </div>
    </div>

    <div id="resultsArea" class="results-area">
        <p style="text-align: center; color: #999;">התוצאות יופיעו כאן...</p>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5000/api"; // שנה ל-IP של השרת שלך במידת הצורך

    // פונקציה לבדיקת מספרים ספציפיים
    async function checkNumbers() {
        const inputs = document.querySelectorAll('.lotto-in');
        const numbers = Array.from(inputs).map(i => parseInt(i.value)).filter(n => !isNaN(n));

        if (numbers.length !== 6) {
            alert("נא להזין 6 מספרים תקינים");
            return;
        }

        const resultDiv = document.getElementById('checkResult');
        resultDiv.innerHTML = "בודק במאגר...";

        try {
            const response = await fetch(`${API_BASE}/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numbers: numbers })
            });
            const data = await response.json();

            if (data.status === "approved") {
                resultDiv.innerHTML = `<div class="status-msg approved">${data.message}</div>`;
            } else {
                resultDiv.innerHTML = `<div class="status-msg rejected">${data.message}</div>`;
            }
        } catch (e) {
            resultDiv.innerHTML = `<div class="status-msg rejected">שגיאה בחיבור לשרת ה-API</div>`;
        }
    }

    // פונקציה לקבלת המלצות (כיסוי, גיוון, סטטיסטיקה)
    async function fetchSuggestions(type) {
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = "מייצר תוצאות מהמאגר המאושר...";

        let endpoint = `/suggest/${type}`;
        if (type === 'coverage') endpoint += '?count=200';

        try {
            const response = await fetch(`${API_BASE}${endpoint}`);
            const data = await response.json();
            
            // חילוץ המפתח הנכון מה-JSON (תלוי ב-Endpoint)
            const suggestions = data.suggestions || data.diverse_suggestions || data.top_statistical_suggestions;

            displayResults(suggestions);
        } catch (e) {
            resultsArea.innerHTML = "שגיאה בשליפת נתונים מהשרת.";
        }
    }

    // הצגת הצירופים ככדורים
    function displayResults(combos) {
        const resultsArea = document.getElementById('resultsArea');
        if (!combos || combos.length === 0) {
            resultsArea.innerHTML = "לא נמצאו צירופים תואמים.";
            return;
        }

        let html = `<h4>נמצאו ${combos.length} צירופים מאושרים:</h4><div style="max-height: 400px; overflow-y: auto;">`;
        
        combos.forEach((combo, index) => {
            html += `<div style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding: 5px;">`;
            html += `<strong>#${index + 1}:</strong> `;
            combo.sort((a, b) => a - b).forEach(num => {
                html += `<span class="lotto-ball">${num}</span>`;
            });
            html += `</div>`;
        });

        html += `</div>`;
        resultsArea.innerHTML = html;
    }
</script>

</body>
</html>
